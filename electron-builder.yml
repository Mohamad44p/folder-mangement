appId: io.folders.app
productName: Folders
artifactName: ${productName}-${version}-${os}-${arch}.${ext}

directories:
  buildResources: build
  output: release

files:
  - dist-electron/**/*
  - dist-renderer/**/*
  - electron/db/schema.sql
  - package.json
  - "!**/.vscode/*"
  - "!src/**/*"
  - "!docs/**/*"
  - "!**/*.test.{ts,tsx}"

asar: true
asarUnpack:
  - "**/node_modules/better-sqlite3/**"
  - "**/node_modules/sharp/**"

extraResources:
  - from: electron/db/schema.sql
    to: schema.sql

publish:
  provider: github
  owner: Mohamad44p
  repo: folder-mangement
  releaseType: draft

win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64
  icon: build/icon.png
  signAndEditExecutable: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  installerIcon: build/icon.png
  uninstallerIcon: build/icon.png
  installerHeaderIcon: build/icon.png

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: build/icon.png
  category: public.app-category.productivity
  hardenedRuntime: false
  gatekeeperAssess: false

dmg:
  icon: build/icon.png
